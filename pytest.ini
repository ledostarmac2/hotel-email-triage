[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --tb=short
    -q
asyncio_mode = auto
markers =
    unit: fast isolated tests with no live services or repo runtime writes
    integration: tests that exercise multiple local modules or FastAPI routes with mocked services
    ui: native desktop/UI contract tests that do not launch a live browser engine
    slow: broader scans or high-volume scenario suites
    safety: guardrail tests for read-only Outlook, secrets, privacy, and no external AI
filterwarnings =
    ignore::DeprecationWarning:semantic_kernel
    ignore::DeprecationWarning:pydantic
    ignore::UserWarning:uvicorn
