<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ReplyRight · Reset Password</title>
    <link rel="icon" href="/static/replyright.ico" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f1117; color: #e8e8e8;
        min-height: 100vh; display: flex; align-items: stretch;
      }
      .brand-panel {
        flex: 1; background: #131722; border-right: 1px solid #1e2130;
        display: flex; flex-direction: column; align-items: center;
        justify-content: center; padding: 48px 40px; gap: 28px;
      }
      .brand-panel img { width: 100%; max-width: 320px; height: auto; object-fit: contain; }
      .brand-divider { width: 40px; height: 2px; background: #5b6af0; border-radius: 2px; }
      .brand-tagline { text-align: center; color: rgba(255,255,255,0.4); font-size: 0.9rem; letter-spacing: 0.03em; }
      .brand-desc { text-align: center; color: rgba(255,255,255,0.25); font-size: 0.78rem; line-height: 1.7; max-width: 280px; }
      .form-panel {
        width: 420px; flex-shrink: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; padding: 48px 44px; background: #1a1d27;
      }
      .form-inner { width: 100%; }
      h1 { font-size: 1.35rem; font-weight: 700; color: #fff; margin-bottom: 6px; }
      .form-sub { font-size: 0.83rem; color: rgba(255,255,255,0.35); margin-bottom: 32px; }
      .field { margin-bottom: 16px; }
      label { display: block; font-size: 0.78rem; color: rgba(255,255,255,0.45); margin-bottom: 6px; font-weight: 500; letter-spacing: 0.02em; }
      input[type="password"] {
        width: 100%; background: #0f1117; border: 1px solid #2a2d3a; border-radius: 7px;
        padding: 11px 14px; color: #e8e8e8; font-size: 0.9rem; outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
      }
      input[type="password"]:focus { border-color: #5b6af0; box-shadow: 0 0 0 3px rgba(91,106,240,0.15); }
      .btn-primary {
        width: 100%; background: #5b6af0; color: #fff; border: none; border-radius: 7px;
        padding: 13px; font-size: 0.92rem; font-weight: 600; cursor: pointer;
        transition: background 0.15s, transform 0.1s; letter-spacing: 0.02em; margin-top: 8px;
      }
      .btn-primary:hover { background: #4a59df; }
      .btn-primary:active { transform: scale(0.99); }
      .btn-primary:disabled { background: #3a3d5a; cursor: not-allowed; transform: none; }
      .msg {
        border-radius: 7px; padding: 10px 14px; font-size: 0.83rem;
        margin-bottom: 16px; display: none;
      }
      .msg.error { background: rgba(220,50,50,0.12); border: 1px solid rgba(220,50,50,0.3); color: #ff8080; }
      .msg.success { background: rgba(50,200,100,0.12); border: 1px solid rgba(50,200,100,0.3); color: #80d080; }
      .back-link { display: block; text-align: center; margin-top: 24px; color: #5b6af0; text-decoration: none; font-size: 0.83rem; }
      .back-link:hover { color: #7b89f4; }
      .footer-note { text-align: center; margin-top: 32px; font-size: 0.73rem; color: rgba(255,255,255,0.18); letter-spacing: 0.04em; text-transform: uppercase; }
    </style>
  </head>
  <body>
    <div class="brand-panel">
      <img src="/static/replyright-logo.png" alt="ReplyRight" />
      <div class="brand-divider"></div>
      <p class="brand-tagline">The right response, every time.</p>
      <p class="brand-desc">AI-powered email triage for the Waldorf Astoria New York reservations team.</p>
    </div>

    <div class="form-panel">
      <div class="form-inner">
        <h1>Set new password</h1>
        <p class="form-sub">Choose a strong password for your account.</p>

        <div class="msg error" id="errorMsg"></div>
        <div class="msg success" id="successMsg"></div>

        <div id="resetForm">
          <div class="field">
            <label for="newPassword">New password</label>
            <input type="password" id="newPassword" placeholder="At least 8 characters" required />
          </div>
          <div class="field">
            <label for="confirmPassword">Confirm password</label>
            <input type="password" id="confirmPassword" placeholder="Repeat password" required />
          </div>
          <button class="btn-primary" id="submitBtn" type="button">Set Password</button>
        </div>

        <a href="/login" class="back-link">← Back to sign in</a>
        <p class="footer-note">Waldorf Astoria New York &nbsp;·&nbsp; Reservations</p>
      </div>
    </div>

    <script>
      const token = new URLSearchParams(window.location.search).get("token");
      const errorMsg = document.getElementById("errorMsg");
      const successMsg = document.getElementById("successMsg");
      const submitBtn = document.getElementById("submitBtn");

      if (!token) {
        errorMsg.textContent = "Invalid or missing reset link. Please request a new one.";
        errorMsg.style.display = "block";
        document.getElementById("resetForm").style.display = "none";
      }

      submitBtn.addEventListener("click", async () => {
        const pw = document.getElementById("newPassword").value;
        const confirm = document.getElementById("confirmPassword").value;
        errorMsg.style.display = "none";
        successMsg.style.display = "none";

        if (pw.length < 8) {
          errorMsg.textContent = "Password must be at least 8 characters.";
          errorMsg.style.display = "block"; return;
        }
        if (pw !== confirm) {
          errorMsg.textContent = "Passwords don't match.";
          errorMsg.style.display = "block"; return;
        }

        submitBtn.disabled = true; submitBtn.textContent = "Saving…";
        try {
          const res = await fetch("/api/auth/reset-password", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ token, new_password: pw }),
          });
          const data = await res.json();
          if (res.ok) {
            successMsg.textContent = "Password updated! Redirecting to sign in…";
            successMsg.style.display = "block";
            document.getElementById("resetForm").style.display = "none";
            setTimeout(() => { window.location.href = "/login"; }, 2000);
          } else {
            errorMsg.textContent = data.detail || "Could not reset password. The link may have expired.";
            errorMsg.style.display = "block";
          }
        } catch {
          errorMsg.textContent = "Connection error. Please try again.";
          errorMsg.style.display = "block";
        } finally {
          submitBtn.disabled = false; submitBtn.textContent = "Set Password";
        }
      });
    </script>
  </body>
</html>
