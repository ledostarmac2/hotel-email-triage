services:
  replyright:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      APP_HOST: 0.0.0.0
      APP_PORT: "8000"
      SQLITE_DB_PATH: /app/data/hotel_email_triage.sqlite3
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
