name: Build

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Compile active Python source
        shell: pwsh
        run: |
          $files = git ls-files '*.py' |
            Where-Object {
              $_ -notmatch '^(reference|app|build|dist|dist2|data)/'
            }
          foreach ($file in $files) {
            python -m py_compile $file
          }
      - name: Pytest
        shell: pwsh
        run: python -m pytest tests/ -x --timeout=60

  build-exe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Write CI .env
        shell: pwsh
        run: |
          @"
          MICROSOFT_CLIENT_ID=
          MICROSOFT_CLIENT_SECRET=
          MICROSOFT_TENANT_ID=
          MICROSOFT_REDIRECT_URI=
          OPENAI_API_KEY=
          OPENAI_MODEL=gpt-4.1
          GOOGLE_AI_API_KEY=
          GOOGLE_AI_MODEL=
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL=claude-opus-4-7
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=
          REPLYRIGHT_ADMIN_EMAIL=
          REPLYRIGHT_ADMIN_PASSWORD=
          SMTP_HOST=smtp.office365.com
          SMTP_PORT=587
          SMTP_USER=
          SMTP_PASSWORD=
          SMTP_FROM=
          "@ | Set-Content -Path .env -Encoding UTF8
      - name: Verify runtime keys for installer
        shell: pwsh
        run: |
          $required = @("ANTHROPIC_API_KEY", "SUPABASE_URL", "SUPABASE_KEY")
          $values = @{}
          Get-Content ".env" | ForEach-Object {
            if ($_ -match "^\s*([^#=]+)=(.*)$") { $values[$Matches[1].Trim()] = $Matches[2].Trim() }
          }
          $missing = @($required | Where-Object { -not $values.ContainsKey($_) -or [string]::IsNullOrWhiteSpace($values[$_]) })
          if ($missing.Count -gt 0) { throw "Missing required release runtime secrets: $($missing -join ', ')" }
      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Build EXE
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\build_exe.ps1
      - name: Packaged health smoke
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -Command "& '.\dist\ReplyRight\ReplyRight.exe' --health-smoke"
      - name: Build Installer
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\installer\build_installer.ps1
      - name: Upload Installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ReplyRightSetup-${{ github.sha }}
          path: installer/output/ReplyRightSetup-v*.exe
          if-no-files-found: error

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Write CI .env
        run: |
          cat > .env <<EOF
          MICROSOFT_CLIENT_ID=
          MICROSOFT_CLIENT_SECRET=
          MICROSOFT_TENANT_ID=
          MICROSOFT_REDIRECT_URI=
          OPENAI_API_KEY=
          OPENAI_MODEL=gpt-4.1
          GOOGLE_AI_API_KEY=
          GOOGLE_AI_MODEL=
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL=claude-opus-4-7
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=
          REPLYRIGHT_ADMIN_EMAIL=
          REPLYRIGHT_ADMIN_PASSWORD=
          SMTP_HOST=smtp.office365.com
          SMTP_PORT=587
          SMTP_USER=
          SMTP_PASSWORD=
          SMTP_FROM=
          EOF
      - name: Build Docker image
        run: docker build -t replyright-ci .
      - name: Run health check
        run: |
          docker run --rm -d --name replyright-ci --env-file .env -p 8000:8000 replyright-ci
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:8000/api/health; then
              docker stop replyright-ci
              exit 0
            fi
            sleep 2
          done
          docker logs replyright-ci
          docker stop replyright-ci
          exit 1

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, build-exe]
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Write CI .env
        shell: pwsh
        run: |
          @"
          MICROSOFT_CLIENT_ID=
          MICROSOFT_CLIENT_SECRET=
          MICROSOFT_TENANT_ID=
          MICROSOFT_REDIRECT_URI=
          OPENAI_API_KEY=
          OPENAI_MODEL=gpt-4.1
          GOOGLE_AI_API_KEY=
          GOOGLE_AI_MODEL=
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL=claude-opus-4-7
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY=${{ secrets.SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY=
          REPLYRIGHT_ADMIN_EMAIL=
          REPLYRIGHT_ADMIN_PASSWORD=
          SMTP_HOST=smtp.office365.com
          SMTP_PORT=587
          SMTP_USER=
          SMTP_PASSWORD=
          SMTP_FROM=
          "@ | Set-Content -Path .env -Encoding UTF8
      - name: Verify runtime keys for release installer
        shell: pwsh
        run: |
          $required = @("ANTHROPIC_API_KEY", "SUPABASE_URL", "SUPABASE_KEY")
          $values = @{}
          Get-Content ".env" | ForEach-Object {
            if ($_ -match "^\s*([^#=]+)=(.*)$") { $values[$Matches[1].Trim()] = $Matches[2].Trim() }
          }
          $missing = @($required | Where-Object { -not $values.ContainsKey($_) -or [string]::IsNullOrWhiteSpace($values[$_]) })
          if ($missing.Count -gt 0) { throw "Missing required release runtime secrets: $($missing -join ', ')" }
      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt
      - name: Security Lint (Source)
        shell: pwsh
        run: python scripts/check_no_bundled_secrets.py
      - name: Build EXE
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\build_exe.ps1
      - name: Packaged health smoke
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -Command "& '.\dist\ReplyRight\ReplyRight.exe' --health-smoke"
      - name: Build Installer
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\installer\build_installer.ps1
      - name: Security Lint (Installer Extraction)
        shell: pwsh
        run: |
          choco install innoextract -y --no-progress
          $installer = Get-ChildItem ".\installer\output\ReplyRightSetup-v*.exe" | Select-Object -First 1
          if (-not $installer) { throw "Installer missing for extraction audit." }
          innoextract $installer.FullName -d ".\installer\output\extracted"
          $extractExit = $LASTEXITCODE
          if ($extractExit -ne 0) {
            Write-Warning "innoextract could not unpack this installer format; auditing the staged dist payload and installer output instead."
            if (-not (Test-Path ".\dist\ReplyRight")) { throw "Staged dist payload missing for fallback audit." }
          }
          $env:ALLOW_RELEASE_RUNTIME_SECRETS = "1"
          python scripts/check_no_bundled_secrets.py
      - name: Verify release installer runtime config
        shell: pwsh
        run: |
          $expected = ".\dist\ReplyRight\.env"
          if (-not (Test-Path $expected)) { throw "Release runtime .env missing from staged payload." }
          $content = Get-Content $expected
          foreach ($name in @("ANTHROPIC_API_KEY", "SUPABASE_URL", "SUPABASE_KEY")) {
            if (-not ($content | Where-Object { $_ -match "^$name=\S+" })) {
              throw "Release runtime .env is missing required key: $name"
            }
          }
      - name: Rename Installer
        shell: pwsh
        run: |
          $built = Get-ChildItem ".\installer\output\ReplyRightSetup-v*.exe" | Select-Object -First 1
          if (-not $built) { throw "Installer was not created." }
          $target = (Resolve-Path ".\installer\output").Path
          $expected = Join-Path $target "ReplyRightSetup-${{ github.ref_name }}.exe"
          if ($built.FullName -ne $expected) {
            Copy-Item $built.FullName $expected -Force
          }
      - name: Release smoke gate
        shell: pwsh
        run: |
          python -m pytest tests/test_desktop_startup.py -q
          $expected = ".\installer\output\ReplyRightSetup-${{ github.ref_name }}.exe"
          if (-not (Test-Path $expected)) { throw "Release installer missing: $expected" }
          if ((Get-Item $expected).Length -lt 1MB) { throw "Release installer is unexpectedly small." }
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ReplyRight ${{ github.ref_name }}
          body: |
            ## ReplyRight ${{ github.ref_name }}

            Waldorf Astoria New York — Reservations Intelligence Dashboard

            ### Install
            1. Download `ReplyRightSetup-${{ github.ref_name }}.exe` below
            2. Run the installer — no other software required (except Outlook Classic for live inbox sync)

            ### What's New
            See [CHANGELOG](https://github.com/ledostarmac2/hotel-email-triage/blob/main/docs/CHANGELOG_AI.md) for details.
          files: installer/output/ReplyRightSetup-${{ github.ref_name }}.exe
          draft: false
          prerelease: false
